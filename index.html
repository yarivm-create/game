<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,"> 
    <title>מבצע איתי: ברית אסטרטגית</title>
    <style>
        :root { --primary: #00e5ff; --enemy: #ff0055; --bg: #010204; --gold: #f1c40f; --iron: #2ed573; --usa: #3c3b6e; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; user-select: none; }
        
        #hud { 
            position: absolute; top: 0; width: 100%; height: 110px; 
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
            background: rgba(0,0,0,0.85); border-bottom: 3px solid var(--primary);
        }
        .stat-box { text-align: center; padding: 10px; border-radius: 8px; background: rgba(255,255,255,0.05); min-width: 120px; border: 1px solid #333; }
        .label { font-size: 11px; color: #888; display: block; margin-bottom: 4px; }
        .value { font-size: 24px; font-weight: bold; color: var(--primary); direction: ltr; display: block; }

        .shield-effect {
            position: absolute; left: 140px; top: 110px; width: 15px; height: calc(100vh - 200px);
            background: var(--iron); border-radius: 20px; z-index: 50;
            box-shadow: 0 0 20px var(--iron); display: none; opacity: 0.8;
        }

        #shop {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 100; background: rgba(0,0,0,0.9); padding: 15px; border-radius: 20px; border: 1px solid #444;
        }
        .weapon-card {
            background: #121a24; border: 2px solid var(--primary); padding: 10px;
            border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s; min-width: 85px;
        }
        .weapon-card:hover:not(.disabled) { background: var(--primary); color: #000; transform: translateY(-5px); }
        .weapon-card.disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }
        .price { display: block; font-size: 12px; color: var(--gold); margin-top: 4px; }
        
        #usa-aid-btn { 
            position: absolute; top: 130px; left: 20px; background: var(--usa); 
            border: 2px solid white; color: white; padding: 15px; border-radius: 50%;
            cursor: pointer; display: none; font-weight: bold; font-size: 20px;
            box-shadow: 0 0 15px rgba(255,255,255,0.5); z-index: 200;
        }

        #start-overlay { position: absolute; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .start-btn { padding: 20px 60px; font-size: 25px; background: none; border: 4px solid var(--primary); color: var(--primary); cursor: pointer; font-weight: bold; }
    </style>

    <script>
        let game = {
            budget: 5000, iranBudget: 5000, 
            playerHP: 1500, iranHP: 5000, playerMaxHP: 1500,
            units: [], particles: [], gameActive: false,
            ironDomeActive: false, usaAidUsed: false, lastTick: 0, shake: 0
        };

        const types = {
            f35: { name: 'F-35', emoji: '✈️', speed: 10, dmg: 80, cost: 500, reward: 200 },
            b2: { name: 'B-2', emoji: '🛸', speed: 5, dmg: 400, cost: 2000, reward: 600 },
            jericho: { name: 'יריחו', emoji: '🚀', speed: 18, dmg: 1000, cost: 4500, reward: 1500 },
            iran_missile: { cost: 600, speed: -5, dmg: 60, emoji: '☄️' }
        };

        const sounds = {
            swoosh: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
            boom: new Audio('https://assets.mixkit.co/active_storage/sfx/1614/1614-preview.mp3'),
            laser: new Audio('https://assets.mixkit.co/active_storage/sfx/612/612-preview.mp3'),
            cash: new Audio('https://assets.mixkit.co/active_storage/sfx/1997/1997-preview.mp3')
        };

        window.startGame = function() {
            document.getElementById('start-overlay').style.display = 'none';
            game.gameActive = true;
            requestAnimationFrame(loop);
        };

        function buyWeapon(id) {
            if (!game.gameActive || game.budget < types[id].cost) return;
            game.budget -= types[id].cost;
            spawnUnit(id, 60, true);
            sounds.swoosh.currentTime = 0;
            sounds.swoosh.play().catch(()=>{});
        }

        function spawnUnit(id, x, isAlly) {
            const config = isAlly ? types[id] : types.iran_missile;
            game.units.push({
                ...config, x, isAlly,
                y: 200 + Math.random() * (window.innerHeight - 400)
            });
        }

        function activateIronDome() {
            if (!game.gameActive || game.budget < 1000 || game.ironDomeActive) return;
            game.budget -= 1000;
            game.ironDomeActive = true;
            document.getElementById('shield-anim').style.display = 'block';
            sounds.laser.play().catch(()=>{});
            setTimeout(() => {
                game.ironDomeActive = false;
                document.getElementById('shield-anim').style.display = 'none';
            }, 8000);
        }

        function useUsaAid() {
            if (game.usaAidUsed) return;
            game.budget += 4000; // מענק סיוע
            game.usaAidUsed = true;
            document.getElementById('usa-aid-btn').style.display = 'none';
            sounds.cash.play().catch(()=>{});
            game.shake = 10;
        }

        function createExplosion(x, y, color) {
            for(let i=0; i<12; i++) {
                game.particles.push({
                    x, y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12,
                    life: 1.2, color: color || '#ffaa00'
                });
            }
        }

        function loop(now) {
            if (!game.gameActive) return;
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            
            // רעידות מסך
            let dx = (Math.random()-0.5) * game.shake;
            let dy = (Math.random()-0.5) * game.shake;
            ctx.setTransform(1, 0, 0, 1, dx, dy);
            if(game.shake > 0) game.shake *= 0.85;

            if (now - game.lastTick > 1000) {
                game.budget += 100;
                game.iranBudget += 100;
                game.lastTick = now;
                updateUI();
            }

            if (game.iranBudget >= types.iran_missile.cost && Math.random() < 0.018) {
                game.iranBudget -= types.iran_missile.cost;
                spawnUnit(null, canvas.width - 60, false);
            }

            ctx.fillStyle = '#010204';
            ctx.fillRect(-100, -100, canvas.width+200, canvas.height+200);

            game.particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.03;
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                ctx.fillRect(p.x, p.y, 3, 3);
                if (p.life <= 0) game.particles.splice(i, 1);
            });
            ctx.globalAlpha = 1;

            game.units.forEach((u, i) => {
                u.x += u.speed;
                if (!u.isAlly && game.ironDomeActive && u.x < 160 && u.x > 130) {
                    createExplosion(u.x, u.y, '#2ed573');
                    sounds.boom.currentTime = 0; sounds.boom.play().catch(()=>{});
                    game.units.splice(i, 1);
                    return;
                }
                ctx.font = `${u.isAlly ? 40 : 30}px Arial`;
                ctx.fillText(u.emoji, u.x, u.y);
                if ((u.isAlly && u.x > canvas.width - 50) || (!u.isAlly && u.x < 50)) {
                    if (u.isAlly) { game.iranHP -= u.dmg; game.budget += u.reward; }
                    else { game.playerHP -= u.dmg; }
                    createExplosion(u.x, u.y, u.isAlly ? '#00e5ff' : '#ff0055');
                    sounds.boom.currentTime = 0; sounds.boom.play().catch(()=>{});
                    game.units.splice(i, 1);
                    game.shake = 10;
                    updateUI();
                }
            });
            requestAnimationFrame(loop);
        }

        function updateUI() {
            let hpPercent = (game.playerHP / game.playerMaxHP) * 100;
            document.getElementById('budget').innerText = `$${Math.floor(game.budget)}`;
            document.getElementById('iran-budget').innerText = `$${Math.floor(game.iranBudget)}`;
            document.getElementById('p-hp').innerText = `${Math.max(0, Math.floor(hpPercent))}%`;
            document.getElementById('i-hp').innerText = `${Math.max(0, Math.floor((game.iranHP/5000)*100))}%`;
            
            // בדיקת סיוע אמריקאי
            if (hpPercent < 30 && !game.usaAidUsed) {
                document.getElementById('usa-aid-btn').style.display = 'block';
            }

            document.querySelectorAll('.weapon-card').forEach(btn => {
                btn.classList.toggle('disabled', game.budget < btn.dataset.cost);
            });

            if (game.gameActive) {
                if (game.iranHP <= 0) { game.gameActive = false; alert("ניצחון לאיתי!"); location.reload(); }
                if (game.playerHP <= 0) { game.gameActive = false; alert("הפסד..."); location.reload(); }
            }
        }

        window.onload = () => {
            const canvas = document.getElementById('gameCanvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
    </script>
</head>
<body>

<div id="start-overlay">
    <h1 style="color: var(--primary); font-size: 40px;">מבצע איתי: הברית</h1>
    <button class="start-btn" onclick="startGame()">התחל בקרב</button>
</div>

<div id="hud">
    <div class="stat-box"><span class="label">תקציב</span><span id="budget" class="value">$5000</span></div>
    <div class="stat-box"><span class="label">חיים</span><span id="p-hp" class="value">100%</span></div>
    <div class="stat-box" style="border-color: var(--enemy);"><span class="label">איראן</span><span id="i-hp" class="value" style="color: var(--enemy)">100%</span></div>
    <div class="stat-box" style="border-color: var(--enemy);"><span class="label">תקציב איראן</span><span id="iran-budget" class="value" style="color: var(--enemy)">$5000</span></div>
</div>

<div id="usa-aid-btn" onclick="useUsaAid()">🇺🇸 קבל סיוע!</div>
<div id="shield-anim" class="shield-effect"></div>

<canvas id="gameCanvas"></canvas>

<div id="shop">
    <div class="weapon-card" data-cost="500" onclick="buyWeapon('f35')"><span>F-35</span><span class="price">$500</span></div>
    <div class="weapon-card" data-cost="2000" onclick="buyWeapon('b2')"><span>B-2</span><span class="price">$2000</span></div>
    <div class="weapon-card" data-cost="4500" onclick="buyWeapon('jericho')"><span>יריחו</span><span class="price">$4500</span></div>
    <div class="weapon-card" id="iron-dome-btn" data-cost="1000" onclick="activateIronDome()"><span>כיפת ברזל</span><span class="price">$1000</span></div>
</div>

</body>
</html>
