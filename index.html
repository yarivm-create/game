<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מבצע איתי: Elite Air Force</title>
    <style>
        :root { --neon-blue: #00e5ff; --neon-red: #ff0055; --gold: #f1c40f; }
        body { margin: 0; background: #020406; color: white; font-family: 'Assistant', sans-serif; overflow: hidden; }
        
        /* מסך התחלה לאישור סאונד */
        #start-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        .start-btn { 
            padding: 20px 40px; font-size: 30px; background: none; 
            border: 3px solid var(--neon-blue); color: var(--neon-blue); 
            cursor: pointer; transition: 0.3s;
        }
        .start-btn:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 30px var(--neon-blue); }

        #ui-layer {
            position: absolute; top: 0; width: 100%; height: 100px;
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }

        .stat-card { text-align: center; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 5px; border: 1px solid var(--neon-blue); }
        .number { font-size: 24px; font-weight: bold; color: var(--neon-blue); direction: ltr; display: block; }

        canvas { display: block; }

        #command-center {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px; z-index: 100;
        }

        .cmd-btn {
            background: rgba(5, 10, 20, 0.8); border: 2px solid var(--neon-blue);
            color: var(--neon-blue); padding: 15px 25px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="start-overlay">
    <h1 style="color: var(--neon-blue)">COMMANDER ITAY</h1>
    <button class="start-btn" onclick="startGame()">כניסה למערכת</button>
</div>

<div id="ui-layer">
    <div class="stat-card"><span>BUDGET</span><span id="budget" class="number">$5000</span></div>
    <div class="stat-card"><span>COALITION</span><span id="player-hp" class="number">100%</span></div>
    <div class="stat-card" style="border-color: var(--neon-red)"><span>IRAN HP</span><span id="iran-hp" class="number">100%</span></div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="command-center">
    <button class="cmd-btn" onclick="spawnUnit('f35')">F-35</button>
    <button class="cmd-btn" onclick="spawnUnit('b2')">B-2 BOMBER</button>
    <button class="cmd-btn" onclick="spawnUnit('jericho')">JERICHO MISSILE</button>
    <button class="cmd-btn" id="end-turn" onclick="triggerEnemy()" style="border-color: var(--gold); color: var(--gold);">END TURN</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // הגדרת סאונדים
    const sounds = {
        swoosh: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
        boom: new Audio('https://assets.mixkit.co/active_storage/sfx/1614/1614-preview.mp3')
    };

    function playSound(name) {
        sounds[name].currentTime = 0; // לאפס כדי שיוכל לנגן שוב מיד
        sounds[name].play();
    }

    function startGame() {
        document.getElementById('start-overlay').style.display = 'none';
        // צליל פתיחה קטן
        playSound('swoosh');
        loop();
    }

    let game = {
        budget: 5000, playerHP: 100, iranHP: 100,
        units: [], particles: [], shake: 0
    };

    const types = {
        f35: { emoji: '✈️', speed: 8, dmg: 10, cost: 500, size: 30, trail: '#00e5ff' },
        b2: { emoji: '🛸', speed: 4, dmg: 40, cost: 1500, size: 50, trail: '#555' },
        jericho: { emoji: '🚀', speed: 14, dmg: 60, cost: 3000, size: 25, trail: '#ffaa00' },
        iran: { emoji: '☄️', speed: -6, dmg: 20, size: 30, trail: '#ff0055' }
    };

    function spawnUnit(id) {
        if(game.budget < types[id].cost) return;
        game.budget -= types[id].cost;
        createUnit(id, 50, true);
        playSound('swoosh');
        updateUI();
    }

    function triggerEnemy() {
        setTimeout(() => {
            createUnit('iran', canvas.width - 50, false);
            playSound('swoosh');
        }, 1000);
    }

    function createUnit(id, x, isAlly) {
        game.units.push({
            ...types[id], x, isAlly,
            y: 200 + Math.random() * (canvas.height - 400)
        });
    }

    function createParticle(x, y, color) {
        for(let i=0; i<3; i++) {
            game.particles.push({
                x, y, color,
                vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4,
                life: 1.0
            });
        }
    }

    function updateUI() {
        document.getElementById('budget').innerText = `$${game.budget}`;
        document.getElementById('player-hp').innerText = `${game.playerHP}%`;
        document.getElementById('iran-hp').innerText = `${game.iranHP}%`;
    }

    function loop() {
        let dx = (Math.random() - 0.5) * game.shake;
        let dy = (Math.random() - 0.5) * game.shake;
        ctx.setTransform(1,0,0,1, dx, dy);
        if(game.shake > 0) game.shake *= 0.9;

        ctx.fillStyle = '#020406';
        ctx.fillRect(-50,-50, canvas.width+100, canvas.height+100);

        game.particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.03;
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.fillRect(p.x, p.y, 2, 2);
            if(p.life <= 0) game.particles.splice(i, 1);
        });
        ctx.globalAlpha = 1.0;

        game.units.forEach((u, i) => {
            u.x += u.isAlly ? u.speed : u.speed;
            createParticle(u.x, u.y, u.trail);
            ctx.font = `${u.size}px Arial`;
            ctx.fillText(u.emoji, u.x, u.y);

            if((u.isAlly && u.x > canvas.width - 50) || (!u.isAlly && u.x < 50)) {
                if(u.isAlly) game.iranHP -= u.dmg; else game.playerHP -= u.dmg;
                game.shake = 20;
                playSound('boom');
                game.units.splice(i, 1);
                updateUI();
            }
        });
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
