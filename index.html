<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>פקודת מבצע: עליונות אסטרטגית - גרסה יציבה</title>
    <style>
        :root { --primary: #00e5ff; --enemy: #ff0055; --bg: #030508; --action: #f1c40f; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Assistant', sans-serif; overflow: hidden; user-select: none; }
        
        #hud { 
            position: absolute; top: 0; width: 100%; height: 90px; 
            background: linear-gradient(to bottom, rgba(0, 229, 255, 0.15), transparent);
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }

        .stat-box { text-align: center; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 6px; border: 1px solid var(--primary); min-width: 140px; }
        .value { font-size: 24px; font-weight: bold; color: var(--primary); direction: ltr; display: block; }
        .hp-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 5px; overflow: hidden; }
        .hp-fill { height: 100%; background: #2ed573; transition: width 0.3s; }

        canvas { display: block; }

        #control-panel {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 100;
        }

        .cmd-btn {
            background: rgba(5, 10, 20, 0.85); border: 2px solid var(--primary);
            color: var(--primary); padding: 15px 25px; cursor: pointer;
            font-weight: bold; border-radius: 4px; transition: 0.2s;
        }

        .cmd-btn:hover:not(:disabled) { background: var(--primary); color: black; box-shadow: 0 0 20px var(--primary); }
        .cmd-btn:disabled { opacity: 0.3; }

        #start-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
    </style>
</head>
<body>

<div id="start-overlay">
    <h1 style="color: var(--primary); font-size: 40px;">המפקד איתי: כניסה למערכת</h1>
    <button style="padding: 20px 50px; font-size: 24px; cursor:pointer;" onclick="startGame()">התחל מבצע</button>
</div>

<div id="hud">
    <div class="stat-box">
        <span style="font-size:12px">תקציב</span>
        <span id="budget" class="value">$5000</span>
    </div>
    <div class="stat-box">
        <span style="font-size:12px">קואליציה</span>
        <span id="player-hp-val" class="value">100%</span>
        <div class="hp-bar"><div id="player-hp-bar" class="hp-fill" style="width: 100%;"></div></div>
    </div>
    <div class="stat-box" style="border-color: var(--enemy);">
        <span style="font-size:12px">איראן</span>
        <span id="iran-hp-val" class="value">100%</span>
        <div class="hp-bar"><div id="iran-hp-bar" class="hp-fill" style="width: 100%; background: var(--enemy);"></div></div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="control-panel">
    <button class="cmd-btn" onclick="spawnUnit('f35')">F-35 ($500)</button>
    <button class="cmd-btn" onclick="spawnUnit('b2')">B-2 ($1500)</button>
    <button class="cmd-btn" onclick="spawnUnit('jericho')">יריחו ($3000)</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const sounds = {
        swoosh: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
        boom: new Audio('https://assets.mixkit.co/active_storage/sfx/1614/1614-preview.mp3')
    };

    let game = {
        budget: 5000,
        playerHP: 1000, playerMaxHP: 1000,
        iranHP: 2500, iranMaxHP: 2500, // הגדלתי משמעותית את החיים של איראן
        units: [], particles: [], 
        gameActive: false,
        lastEnemySpawn: 0
    };

    const types = {
        f35: { emoji: '✈️', speed: 7, dmg: 15, cost: 500, size: 30, trail: '#00e5ff', reward: 100 },
        b2: { emoji: '🛸', speed: 3, dmg: 50, cost: 1500, size: 45, trail: '#555', reward: 250 },
        jericho: { emoji: '🚀', speed: 12, dmg: 150, cost: 3000, size: 25, trail: '#ffaa00', reward: 500 },
        iran: { emoji: '☄️', speed: -5, dmg: 20, size: 25, trail: '#ff0055' }
    };

    function startGame() {
        document.getElementById('start-overlay').style.display = 'none';
        game.gameActive = true;
        loop();
    }

    function spawnUnit(id) {
        if (!game.gameActive || game.budget < types[id].cost) return;
        game.budget -= types[id].cost;
        createUnit(id, 50, true);
        sounds.swoosh.currentTime = 0;
        sounds.swoosh.play();
        updateUI();
    }

    function createUnit(id, x, isAlly) {
        game.units.push({
            ...types[id], x, isAlly,
            y: 200 + Math.random() * (canvas.height - 400)
        });
    }

    function updateUI() {
        document.getElementById('budget').innerText = `$${Math.floor(game.budget)}`;
        
        let pPercent = (game.playerHP / game.playerMaxHP) * 100;
        document.getElementById('player-hp-val').innerText = `${Math.max(0, Math.floor(pPercent))}%`;
        document.getElementById('player-hp-bar').style.width = `${pPercent}%`;
        
        let iPercent = (game.iranHP / game.iranMaxHP) * 100;
        document.getElementById('iran-hp-val').innerText = `${Math.max(0, Math.floor(iPercent))}%`;
        document.getElementById('iran-hp-bar').style.width = `${iPercent}%`;

        // בדיקה אם מישהו הפסיד
        if (game.gameActive) {
            if (game.iranHP <= 0) endGame("ניצחון מוחלט לאיתי!");
            if (game.playerHP <= 0) endGame("הפסד... המערכות קרסו.");
        }
    }

    function endGame(msg) {
        game.gameActive = false; // עוצר את הלולאה ואת הבדיקות
        setTimeout(() => {
            alert(msg);
            location.reload();
        }, 100);
    }

    function loop(now) {
        if (!game.gameActive) return;

        // תקציב עולה לאט
        game.budget += 0.2;

        // בינה מלאכותית של איראן - תוקפת כל 2-4 שניות
        if (now - game.lastEnemySpawn > 2500) {
            createUnit('iran', canvas.width - 50, false);
            game.lastEnemySpawn = now;
        }

        ctx.fillStyle = '#020406';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // עדכון יחידות
        game.units.forEach((u, i) => {
            u.x += u.isAlly ? u.speed : u.speed;
