<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,"> 
    <title>מבצע איתי: עליונות אסטרטגית</title>
    <style>
        :root { --primary: #00e5ff; --enemy: #ff0055; --bg: #030508; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; user-select: none; }
        
        #start-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        .start-btn { 
            padding: 20px 60px; font-size: 30px; background: none; 
            border: 4px solid var(--primary); color: var(--primary); 
            cursor: pointer; font-weight: bold;
        }

        #hud { 
            position: absolute; top: 0; width: 100%; height: 90px; 
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
            background: rgba(0,0,0,0.5); border-bottom: 1px solid var(--primary);
        }

        .stat-box { text-align: center; min-width: 120px; }
        .value { font-size: 24px; font-weight: bold; color: var(--primary); direction: ltr; display: block; }
        
        #control-panel {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 100;
        }
        .cmd-btn {
            background: rgba(5, 10, 20, 0.85); border: 2px solid var(--primary);
            color: var(--primary); padding: 15px 25px; cursor: pointer; font-weight: bold;
        }
        .cmd-btn:hover { background: var(--primary); color: black; }
    </style>

    <script>
        // הגדרות משחק גלובליות
        let game = {
            budget: 5000, playerHP: 1000, iranHP: 2500,
            units: [], gameActive: false, lastEnemySpawn: 0
        };

        const types = {
            f35: { emoji: '✈️', speed: 7, dmg: 20, cost: 500, size: 30, reward: 100 },
            b2: { emoji: '🛸', speed: 3, dmg: 100, cost: 1500, size: 45, reward: 300 },
            jericho: { emoji: '🚀', speed: 12, dmg: 300, cost: 3000, size: 25, reward: 600 },
            iran: { emoji: '☄️', speed: -5, dmg: 50, size: 30 }
        };

        const sounds = {
            swoosh: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
            boom: new Audio('https://assets.mixkit.co/active_storage/sfx/1614/1614-preview.mp3')
        };

        // פונקציית התחלה - מוודא שהיא מוגדרת על ה-window
        window.startGame = function() {
            document.getElementById('start-overlay').style.display = 'none';
            game.gameActive = true;
            requestAnimationFrame(loop);
        };

        function spawnUnit(id) {
            if (!game.gameActive || game.budget < types[id].cost) return;
            game.budget -= types[id].cost;
            game.units.push({
                ...types[id], x: 50, isAlly: true,
                y: 200 + Math.random() * (window.innerHeight - 400)
            });
            sounds.swoosh.currentTime = 0;
            sounds.swoosh.play().catch(e => {}); // מונע שגיאות סאונד
            updateUI();
        }

        function updateUI() {
            document.getElementById('budget').innerText = `$${Math.floor(game.budget)}`;
            document.getElementById('p-hp').innerText = `${Math.max(0, Math.floor((game.playerHP/1000)*100))}%`;
            document.getElementById('i-hp').innerText = `${Math.max(0, Math.floor((game.iranHP/2500)*100))}%`;
            
            if (game.gameActive) {
                if (game.iranHP <= 0) { game.gameActive = false; alert("ניצחון לאיתי!"); location.reload(); }
                if (game.playerHP <= 0) { game.gameActive = false; alert("הפסד..."); location.reload(); }
            }
        }

        function loop(now) {
            if (!game.gameActive) return;
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            
            game.budget += 0.5; // תקציב עולה בזמן אמת

            if (now - game.lastEnemySpawn > 3000) {
                game.units.push({ ...types.iran, x: canvas.width - 50, y: 200 + Math.random() * (canvas.height - 400), isAlly: false });
                game.lastEnemySpawn = now;
            }

            ctx.fillStyle = '#020406';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            game.units.forEach((u, i) => {
                u.x += u.isAlly ? u.speed : u.speed;
                ctx.font = `${u.size}px Arial`;
                ctx.fillText(u.emoji, u.x, u.y);

                if ((u.isAlly && u.x > canvas.width - 50) || (!u.isAlly && u.x < 50)) {
                    if (u.isAlly) { game.iranHP -= u.dmg; game.budget += u.reward; }
                    else { game.playerHP -= u.dmg; }
                    sounds.boom.currentTime = 0;
                    sounds.boom.play().catch(e => {});
                    game.units.splice(i, 1);
                    updateUI();
                }
            });
            requestAnimationFrame(loop);
        }

        window.onload = () => {
            const canvas = document.getElementById('gameCanvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
    </script>
</head>
<body>

<div id="start-overlay">
    <h1 style="color: var(--primary)">המפקד איתי</h1>
    <button class="start-btn" onclick="startGame()">התחל משחק</button>
</div>

<div id="hud">
    <div class="stat-box"><span>תקציב</span><span id="budget" class="value">$5000</span></div>
    <div class="stat-box"><span>קואליציה</span><span id="p-hp" class="value">100%</span></div>
    <div class="stat-box"><span>איראן</span><span id="i-hp" class="value" style="color: var(--enemy)">100%</span></div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="control-panel">
    <button class="cmd-btn" onclick="spawnUnit('f35')">F-35</button>
    <button class="cmd-btn" onclick="spawnUnit('b2')">B-2</button>
    <button class="cmd-btn" onclick="spawnUnit('jericho')">טיל יריחו</button>
</div>

</body>
</html>
