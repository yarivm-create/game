<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,"> 
    <title>מבצע איתי: פיקוד עליון</title>
    <style>
        :root { --primary: #00e5ff; --enemy: #ff0055; --bg: #020406; --gold: #f1c40f; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; user-select: none; }
        
        /* ממשק עליון */
        #hud { 
            position: absolute; top: 0; width: 100%; height: 100px; 
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
            background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--primary);
        }
        .stat-box { text-align: center; }
        .label { font-size: 12px; color: #aaa; display: block; }
        .value { font-size: 26px; font-weight: bold; color: var(--primary); direction: ltr; display: block; }
        
        /* חנות נשקים */
        #shop {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 100; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 15px; border: 1px solid #333;
        }
        .weapon-card {
            background: #1a2634; border: 2px solid var(--primary); padding: 10px;
            border-radius: 10px; text-align: center; cursor: pointer; transition: 0.2s; min-width: 100px;
        }
        .weapon-card:hover:not(.disabled) { background: var(--primary); color: black; transform: translateY(-5px); }
        .weapon-card.disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }
        .price { display: block; font-size: 14px; font-weight: bold; margin-top: 5px; color: var(--gold); }

        #iron-dome-btn { border-color: #2ed573; color: #2ed573; }
        #iron-dome-btn.active { background: #2ed573; color: white; box-shadow: 0 0 20px #2ed573; }

        #rank-display { position: absolute; top: 110px; right: 20px; color: var(--gold); font-weight: bold; font-size: 18px; }
        #start-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    </style>

    <script>
        let game = {
            budget: 5000, playerHP: 1000, iranHP: 5000,
            units: [], gameActive: false, lastEnemySpawn: 0,
            score: 0, rank: "טוראי", ironDomeActive: false
        };

        const types = {
            f35: { name: 'F-35', emoji: '✈️', speed: 8, dmg: 40, cost: 500, reward: 100 },
            b2: { name: 'מפציץ B-2', emoji: '🛸', speed: 4, dmg: 200, cost: 2000, reward: 400 },
            jericho: { name: 'יריחו 3', emoji: '🚀', speed: 14, dmg: 500, cost: 4500, reward: 1000 },
            iran: { emoji: '☄️', speed: -6, dmg: 60 }
        };

        const sounds = {
            swoosh: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
            boom: new Audio('https://assets.mixkit.co/active_storage/sfx/1614/1614-preview.mp3'),
            shield: new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3')
        };

        window.startGame = function() {
            document.getElementById('start-overlay').style.display = 'none';
            game.gameActive = true;
            requestAnimationFrame(loop);
        };

        function buyWeapon(id) {
            if (!game.gameActive || game.budget < types[id].cost) return;
            game.budget -= types[id].cost;
            game.units.push({
                ...types[id], x: 50, isAlly: true,
                y: 200 + Math.random() * (window.innerHeight - 400)
            });
            sounds.swoosh.currentTime = 0;
            sounds.swoosh.play().catch(()=>{});
            updateUI();
        }

        function activateIronDome() {
            if (!game.gameActive || game.budget < 1000 || game.ironDomeActive) return;
            game.budget -= 1000;
            game.ironDomeActive = true;
            sounds.shield.play().catch(()=>{});
            document.getElementById('iron-dome-btn').classList.add('active');
            
            setTimeout(() => {
                game.ironDomeActive = false;
                document.getElementById('iron-dome-btn').classList.remove('active');
            }, 8000); // 8 שניות של הגנה
            updateUI();
        }

        function updateUI() {
            document.getElementById('budget').innerText = `$${Math.floor(game.budget)}`;
            document.getElementById('p-hp').innerText = `${Math.max(0, Math.floor((game.playerHP/1000)*100))}%`;
            document.getElementById('i-hp').innerText = `${Math.max(0, Math.floor((game.iranHP/5000)*100))}%`;
            
            // עדכון דרגות
            if (game.score > 10000) game.rank = "רב-אלוף";
            else if (game.score > 5000) game.rank = "אלוף";
            else if (game.score > 2000) game.rank = "סגן-אלוף";
            document.getElementById('rank-display').innerText = `דרגה: ${game.rank}`;

            // עדכון זמינות כפתורים
            document.querySelectorAll('.weapon-card').forEach(card => {
                const cost = parseInt(card.dataset.cost);
                if (game.budget < cost) card.classList.add('disabled');
                else card.classList.remove('disabled');
            });

            if (game.gameActive) {
                if (game.iranHP <= 0) { game.gameActive = false; alert("ניצחון היסטורי למפקד איתי!"); location.reload(); }
                if (game.playerHP <= 0) { game.gameActive = false; alert("הפסד... נסה שוב."); location.reload(); }
            }
        }

        function loop(now) {
            if (!game.gameActive) return;
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            
            game.budget += 0.8; // הכנסה פסיבית

            // איראן יורה בקצב קבוע
            if (now - game.lastEnemySpawn > 2000) {
                game.units.push({ ...types.iran, x: canvas.width - 50, y: 150 + Math.random() * (canvas.height - 300), isAlly: false });
                game.lastEnemySpawn = now;
            }

            ctx.fillStyle = game.ironDomeActive ? '#05101a' : '#020406';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // הגנה אווירית ויזואלית
            if (game.ironDomeActive) {
                ctx.strokeStyle = '#2ed573';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(100, 0); ctx.lineTo(100, canvas.height);
                ctx.stroke();
                ctx.fillStyle = 'rgba(46, 213, 115, 0.1)';
                ctx.fillRect(0, 0, 100, canvas.height);
            }

            game.units.forEach((u, i) => {
                u.x += u.isAlly ? u.speed : u.speed;
                
                // כיפת ברזל עוצרת טילים
                if (!u.isAlly && game.ironDomeActive && u.x < 110) {
                    game.units.splice(i, 1);
                    game.score += 50;
                    return;
                }

                ctx.font = `${u.isAlly ? 40 : 30}px Arial`;
                ctx.fillText(u.emoji, u.x, u.y);

                if ((u.isAlly && u.x > canvas.width - 50) || (!u.isAlly && u.x < 50)) {
                    if (u.isAlly) { 
                        game.iranHP -= u.dmg; 
                        game.budget += u.reward; 
                        game.score += u.reward;
                    } else { 
                        game.playerHP -= u.dmg; 
                    }
                    sounds.boom.currentTime = 0;
                    sounds.boom.play().catch(()=>{});
                    game.units.splice(i, 1);
                    updateUI();
                }
            });
            requestAnimationFrame(loop);
        }

        window.onload = () => {
            const canvas = document.getElementById('gameCanvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
    </script>
</head>
<body>

<div id="start-overlay">
    <h1 style="color: var(--primary); font-size: 50px;">המפקד איתי: מבצע עליונות</h1>
    <button class="start-btn" onclick="startGame()">אשר פקודות והתחל</button>
</div>

<div id="hud">
    <div class="stat-box"><span class="label">תקציב פנוי</span><span id="budget" class="value">$5000</span></div>
    <div class="stat-box"><span class="label">שלמות הקואליציה</span><span id="p-hp" class="value">100%</span></div>
    <div class="stat-box"><span class="label">חוסן איראני</span><span id="i-hp" class="value" style="color: var(--enemy)">100%</span></div>
</div>

<div id="rank-display">דרגה: טוראי</div>

<canvas id="gameCanvas"></canvas>

<div id="shop">
    <div class="weapon-card" data-cost="500" onclick="buyWeapon('f35')">
        <span>F-35 אדיר</span>
        <span class="price">$500</span>
    </div>
    <div class="weapon-card" data-cost="2000" onclick="buyWeapon('b2')">
        <span>מפציץ B-2</span>
        <span class="price">$2000</span>
    </div>
    <div class="weapon-card" data-cost="4500" onclick="buyWeapon('jericho')">
        <span>טיל יריחו 3</span>
        <span class="price">$4500</span>
    </div>
    <div class="weapon-card" id="iron-dome-btn" data-cost="1000" onclick="activateIronDome()">
        <span>כיפת ברזל</span>
        <span class="price">$1000</span>
    </div>
</div>

</body>
</html>
