<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Middle East Crisis - Elite Command</title>
    <style>
        :root { --primary: #00e5ff; --enemy: #ff0055; --bg: #050a0f; }
        body { 
            background: var(--bg); 
            color: #e0e0e0; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            overflow: hidden; 
            user-select: none;
        }

        /* סרגל עליון */
        #status-bar { 
            height: 70px; 
            background: #1a2634; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            border-bottom: 3px solid var(--primary); 
        }

        .stat-box { text-align: center; }
        .stat-val { 
            font-size: 22px; 
            font-weight: bold; 
            color: var(--primary); 
            direction: ltr; 
            display: block; 
        }

        /* אזור המפה */
        #map-area { 
            height: calc(100vh - 220px); 
            position: relative; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: radial-gradient(circle, #1b2735 0%, #050a0f 100%); 
        }

        .country-card { 
            width: 180px; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid #333; 
            border-radius: 12px; 
            padding: 15px; 
            text-align: center; 
            margin: 0 20px;
        }

        .hp-bar { height: 10px; background: #333; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        .hp-fill { height: 100%; background: #2ed573; transition: width 0.5s; }

        /* לוג הודעות */
        #log { 
            height: 80px; 
            background: #0a0e14; 
            padding: 10px; 
            overflow-y: auto; 
            font-size: 14px; 
            border-top: 1px solid #333; 
        }

        /* כפתורי פעולה */
        #actions { 
            height: 70px; 
            background: #16213e; 
            display: flex; 
            gap: 15px; 
            justify-content: center; 
            align-items: center; 
        }

        .action-btn { 
            background: none; 
            border: 2px solid var(--primary); 
            color: var(--primary); 
            padding: 8px 20px; 
            cursor: pointer; 
            font-weight: bold; 
            border-radius: 5px; 
        }

        .action-btn:hover { background: var(--primary); color: #000; }
        .action-btn:disabled { border-color: #555; color: #555; }

        /* אפקטים */
        .explosion { 
            position: absolute; 
            width: 40px; 
            height: 40px; 
            background: orange; 
            border-radius: 50%; 
            filter: blur(5px); 
            animation: boom 0.5s forwards; 
        }
        @keyframes boom { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
    </style>
</head>
<body>

<div id="status-bar">
    <div class="stat-box">תור<div id="turn-count" class="stat-val">1</div></div>
    <div class="stat-box">תקציב<div id="budget" class="stat-val">$5000</div></div>
    <div id="turn-indicator" style="font-size: 18px; color: #f1c40f;">תורך, המפקד איתי</div>
</div>

<div id="map-area">
    <div id="israel" class="country-card">
        <h3>ישראל 🇮🇱</h3>
        <div class="hp-bar"><div id="israel-hp" class="hp-fill" style="width: 100%;"></div></div>
    </div>
    <div id="usa" class="country-card">
        <h3>ארה"ב 🇺🇸</h3>
        <div class="hp-bar"><div id="usa-hp" class="hp-fill" style="width: 100%;"></div></div>
    </div>
    <div id="iran" class="country-card">
        <h3>איראן 🇮🇷</h3>
        <div class="hp-bar"><div id="iran-hp" class="hp-fill" style="width: 100%; background: var(--enemy);"></div></div>
        <small>גרעין: <span id="nuke-prog" style="direction: ltr; display: inline-block;">10%</span></small>
    </div>
</div>

<div id="log"></div>

<div id="actions">
    <button class="action-btn" onclick="executeAction('strike')">תקיפה אווירית ($500)</button>
    <button class="action-btn" onclick="executeAction('cyber')">לוחמת סייבר ($300)</button>
    <button class="action-btn" onclick="passTurn()" style="border-color: #f1c40f; color: #f1c40f;">סיום תור</button>
</div>

<script>
    let state = {
        turn: 1, budget: 5000,
        israelHP: 100, usaHP: 100, iranHP: 100,
        iranNuke: 10, isPlayerTurn: true
    };

    function addLog(text, color = "#aaa") {
        const log = document.getElementById('log');
        log.innerHTML = `<div style="color:${color}">• ${text}</div>` + log.innerHTML;
    }

    function createExplosion(targetId) {
        const target = document.getElementById(targetId);
        const rect = target.getBoundingClientRect();
        const exp = document.createElement('div');
        exp.className = 'explosion';
        exp.style.left = (rect.left + rect.width/2) + 'px';
        exp.style.top = (rect.top + rect.height/2) + 'px';
        document.body.appendChild(exp);
        setTimeout(() => exp.remove(), 500);
    }

    function executeAction(type) {
        if (!state.isPlayerTurn) return;

        if (type === 'strike' && state.budget >= 500) {
            state.budget -= 500;
            let dmg = Math.floor(Math.random() * 15) + 10;
            state.iranHP -= dmg;
            addLog(`תקיפה מוצלחת! נזק לאיראן: ${dmg}%`, "#00e5ff");
            createExplosion('iran');
        } else if (type === 'cyber' && state.budget >= 300) {
            state.budget -= 300;
            state.iranNuke = Math.max(0, state.iranNuke - 15);
            addLog(`סייבר: תוכנית הגרעין עוכבה ב-15%`, "#2ed573");
        }
        updateUI();
        if (state.iranHP <= 0) { alert("ניצחון לאיתי!"); location.reload(); }
    }

    function passTurn() {
        state.isPlayerTurn = false;
        document.querySelectorAll('.action-btn').forEach(b => b.disabled = true);
        addLog("איראן מתכננת תגובה...", "#ff4757");
        setTimeout(iranTurn, 1000);
    }

    function iranTurn() {
        state.iranNuke += 8;
        let target = Math.random() > 0.5 ? 'israel' : 'usa';
        let dmg = Math.floor(Math.random() * 10) + 5;

        if (target === 'israel' && Math.random() > 0.5) {
            addLog("כיפת ברזל יירטה את המתקפה!", "#f1c40f");
        } else {
            if(target === 'israel') state.israelHP -= dmg;
            else state.usaHP -= dmg;
            addLog(`פגיעה ב${target === 'israel' ? 'ישראל' : 'ארה"ב'}: ${dmg}% נזק`, "#ff4757");
            createExplosion(target);
        }

        state.turn++;
        state.budget += 700;
        state.isPlayerTurn = true;
        document.querySelectorAll('.action-btn').forEach(b => b.disabled = false);
        updateUI();

        if (state.iranNuke >= 100 || state.israelHP <= 0) {
            alert("המשחק נגמר!");
            location.reload();
        }
    }

    function updateUI() {
        document.getElementById('budget').textContent = `$${state.budget}`;
        document.getElementById('turn-count').textContent = state.turn;
        document.getElementById('israel-hp').style.width = state.israelHP + "%";
        document.getElementById('usa-hp').style.width = state.usaHP + "%";
        document.getElementById('iran-hp').style.width = state.iranHP + "%";
        document.getElementById('nuke-prog').textContent = state.iranNuke + "%";
    }
</script>
</body>
</html>
